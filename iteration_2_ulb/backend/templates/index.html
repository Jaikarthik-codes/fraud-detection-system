<!DOCTYPE html>
<html>
<head>
    <title>FraudLens</title>
<h1>FraudLens</h1>
</head>
<body>
    <h1>Fraud Detection System</h1>
    <form action="/predict" method="POST">
        <label>Select Transaction:</label>
        <select name="preset">
            {% for preset in presets %}
                <option value="{{ preset }}"
                {% if selected == preset %}selected{% endif %}>
                {{ preset }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Check Transaction</button>
    </form>

    {% if result %}
        <h2>Result: {{ result }}</h2>
        <p>Fraud Probability: {{ probability }}%</p>
    {% endif %}
</body>
</html>
